<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinadores — Pokédex DataCenter</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="client-body">

    <header class="client-header">
        <div class="client-header-inner container">
            <div class="client-logo">
                <svg class="pokeball-logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="19" fill="white" stroke="#ccc" stroke-width="1"/>
                    <path d="M1 20 Q1 1 20 1 Q39 1 39 20 Z" fill="#e63946"/>
                    <rect x="1" y="18" width="38" height="4" fill="#1a1a2e"/>
                    <circle cx="20" cy="20" r="6" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
                    <circle cx="20" cy="20" r="3" fill="#e63946"/>
                </svg>
                <span>Pokédex DataCenter</span>
            </div>
            <nav class="client-nav">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="pokemon.html">Pokémon</a></li>
                    <li><a href="tipos.html">Tipos</a></li>
                    <li><a href="treinadores.html" class="active">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="client-page-hero trainers-hero">
        <div class="container">
            <h1>Treinadores</h1>
            <p>Conheça os treinadores cadastrados no DataCenter</p>
        </div>
    </div>

    <main class="container client-main">
        <div class="client-toolbar">
            <div class="search-bar">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="campoBusca" placeholder="Buscar por nome, região ou ano de início…" oninput="listar()">
            </div>
            <p class="search-count" id="contagem"></p>
        </div>

        <div class="client-card-grid trainers-grid" id="treiGrid">
            <!-- Cards renderizados pelo JS -->
        </div>
    </main>

    <footer class="client-footer">
        <div class="container client-footer-inner">
            <p>Desenvolvido por: Henry Barcellos</p>
            <a href="../admin/index.html" class="admin-link">Área Admin ⚙</a>
        </div>
    </footer>

    <script>
        const REGION_COLORS = {
            'kanto':  '#e63946',
            'johto':  '#e9c46a',
            'hoenn':  '#2a9d8f',
            'sinnoh': '#7209b7',
            'unova':  '#4361ee',
            'kalos':  '#f72585',
            'alola':  '#fb8500',
            'galar':  '#3a86ff',
            'paldea': '#8338ec',
        };

        function regionColor(regiao) {
            return REGION_COLORS[regiao.toLowerCase().trim()] || '#6B7280';
        }

        function getInitials(nome) {
            return nome.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
        }

        function calcExp(anoIni) {
            const anos = new Date().getFullYear() - parseInt(anoIni);
            if (isNaN(anos) || anos < 0) return '—';
            if (anos === 0) return 'Iniciante';
            if (anos === 1) return '1 ano';
            return `${anos} anos`;
        }

        function expLevel(anoIni) {
            const anos = new Date().getFullYear() - parseInt(anoIni);
            if (isNaN(anos) || anos < 0) return '';
            if (anos < 2) return '🌱 Novato';
            if (anos < 5) return '⚡ Intermediário';
            if (anos < 10) return '🔥 Experiente';
            if (anos < 20) return '💎 Veterano';
            return '👑 Lendário';
        }

        function listar() {
            const treinadores = JSON.parse(localStorage.getItem('treinadores')) || [];
            const termo = (document.getElementById('campoBusca').value || '').toLowerCase().trim();

            const filtrados = treinadores.filter(t => {
                if (!termo) return true;
                return (
                    t.nome.toLowerCase().includes(termo) ||
                    t.regiao.toLowerCase().includes(termo) ||
                    String(t.anoIni).includes(termo)
                );
            });

            const cont = document.getElementById('contagem');
            cont.textContent = termo
                ? `${filtrados.length} resultado(s) para "${termo}"`
                : `${treinadores.length} treinador(es) cadastrado(s)`;

            const grid = document.getElementById('treiGrid');

            if (filtrados.length === 0) {
                grid.innerHTML = `<div class="empty-state"><p>Nenhum treinador encontrado.</p></div>`;
                return;
            }

            grid.innerHTML = filtrados.map(t => {
                const regCor = regionColor(t.regiao);
                const initials = getInitials(t.nome);
                return `
                <div class="trainer-card">
                    <div class="trainer-card-header" style="background: linear-gradient(135deg, ${regCor}22, ${regCor}44)">
                        <div class="trainer-avatar" style="background:${regCor}; color:white">
                            ${initials}
                        </div>
                        <div class="trainer-info">
                            <h3 class="trainer-name">${t.nome}</h3>
                            <span class="trainer-region-badge" style="background:${regCor}15; color:${regCor}; border-color:${regCor}40">
                                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                                </svg>
                                ${t.regiao}
                            </span>
                        </div>
                    </div>
                    <div class="trainer-card-body">
                        <div class="trainer-stat">
                            <span class="trainer-stat-label">Início de carreira</span>
                            <span class="trainer-stat-value">${t.anoIni}</span>
                        </div>
                        <div class="trainer-stat">
                            <span class="trainer-stat-label">Experiência</span>
                            <span class="trainer-stat-value">${calcExp(t.anoIni)}</span>
                        </div>
                        <div class="trainer-level">${expLevel(t.anoIni)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        listar();
    </script>
</body>
</html>
