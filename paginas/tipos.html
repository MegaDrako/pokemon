<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos — Pokédex DataCenter</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="client-body">

    <header class="client-header">
        <div class="client-header-inner container">
            <div class="client-logo">
                <svg class="pokeball-logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="19" fill="white" stroke="#ccc" stroke-width="1"/>
                    <path d="M1 20 Q1 1 20 1 Q39 1 39 20 Z" fill="#e63946"/>
                    <rect x="1" y="18" width="38" height="4" fill="#1a1a2e"/>
                    <circle cx="20" cy="20" r="6" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
                    <circle cx="20" cy="20" r="3" fill="#e63946"/>
                </svg>
                <span>Pokédex DataCenter</span>
            </div>
            <nav class="client-nav">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="pokemon.html">Pokémon</a></li>
                    <li><a href="tipos.html" class="active">Tipos</a></li>
                    <li><a href="treinadores.html">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="client-page-hero tipos-hero">
        <div class="container">
            <h1>Tipos</h1>
            <p>Fraquezas, resistências e imunidades de cada tipo elemental</p>
        </div>
    </div>

    <main class="container client-main">
        <div class="client-toolbar">
            <div class="search-bar">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="campoBusca" placeholder="Buscar por nome, fraqueza, resistência ou imunidade…" oninput="listar()">
            </div>
            <p class="search-count" id="contagem"></p>
        </div>

        <div class="client-card-grid" id="tipoGrid">
            <!-- Cards renderizados pelo JS -->
        </div>
    </main>

    <footer class="client-footer">
        <div class="container client-footer-inner">
            <p>Desenvolvido por: Henry Barcellos</p>
            <a href="../admin/index.html" class="admin-link">Área Admin ⚙</a>
        </div>
    </footer>

    <script>
        const TYPE_COLORS = {
            'fogo':     '#EE8130',
            'agua':     '#6390F0',
            'planta':   '#7AC74C',
            'elétrico': '#F7D02C', 'eletrico': '#F7D02C',
            'normal':   '#A8A77A',
            'voador':   '#89AAE3',
            'veneno':   '#A33EA1',
            'terra':    '#E2BF65',
            'pedra':    '#B6A136',
            'gelo':     '#96D9D6',
            'lutador':  '#C22E28',
            'psíquico': '#F95587', 'psiquico': '#F95587',
            'inseto':   '#A6B91A',
            'fantasma': '#735797',
            'dragão':   '#6F35FC', 'dragao':   '#6F35FC',
            'aço':      '#B7B7CE', 'aco':      '#B7B7CE',
            'sombrio':  '#705746',
            'fada':     '#D685AD',
        };

        function typeColor(nome) {
            return TYPE_COLORS[nome.toLowerCase().trim()] || '#6B7280';
        }

        function tagList(str) {
            if (!str || str === '-') return `<span class="tag tag-empty">—</span>`;
            const LIGHT_COLORS = ['#F7D02C','#A8A77A','#E2BF65','#B6A136','#96D9D6','#7AC74C','#B7B7CE','#A6B91A','#89AAE3'];
            return str.split(',').map(s => {
                const cor = typeColor(s.trim());
                const txt = LIGHT_COLORS.includes(cor) ? '#1a1a2e' : '#ffffff';
                return `<span class="tag" style="background:${cor}; color:${txt}">${s.trim()}</span>`;
            }).join('');
        }

        function listar() {
            const tipos = JSON.parse(localStorage.getItem('tipos')) || [];
            const termo = (document.getElementById('campoBusca').value || '').toLowerCase().trim();

            const filtrados = tipos.filter(t => {
                if (!termo) return true;
                return (
                    t.nome.toLowerCase().includes(termo) ||
                    t.fraqueza.toLowerCase().includes(termo) ||
                    t.resistencia.toLowerCase().includes(termo) ||
                    t.imunidade.toLowerCase().includes(termo)
                );
            });

            const cont = document.getElementById('contagem');
            cont.textContent = termo
                ? `${filtrados.length} resultado(s) para "${termo}"`
                : `${tipos.length} tipo(s) cadastrado(s)`;

            const grid = document.getElementById('tipoGrid');

            if (filtrados.length === 0) {
                grid.innerHTML = `<div class="empty-state"><p>Nenhum tipo encontrado.</p></div>`;
                return;
            }

            grid.innerHTML = filtrados.map(t => {
                const cor = typeColor(t.nome);
                const textColor = '#ffffff';
                return `
                <div class="tipo-card">
                    <div class="tipo-card-header" style="background:${cor}; color:${textColor}">
                        <span class="tipo-nome">${t.nome}</span>
                        <div class="tipo-badge-icon" style="border-color:${textColor}40">
                            <svg viewBox="0 0 30 30" width="28" height="28">
                                <polygon points="15,2 28,9 28,21 15,28 2,21 2,9"
                                    fill="none" stroke="${textColor}" stroke-width="1.5" opacity="0.6"/>
                                <polygon points="15,6 24,11 24,19 15,24 6,19 6,11"
                                    fill="${textColor}" opacity="0.2"/>
                            </svg>
                        </div>
                    </div>
                    <div class="tipo-card-body">
                        <div class="tipo-section">
                            <span class="tipo-label fraq-label">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/>
                                </svg>
                                Fraquezas
                            </span>
                            <div class="tag-list">${tagList(t.fraqueza)}</div>
                        </div>
                        <div class="tipo-section">
                            <span class="tipo-label res-label">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                </svg>
                                Resistências
                            </span>
                            <div class="tag-list">${tagList(t.resistencia)}</div>
                        </div>
                        <div class="tipo-section">
                            <span class="tipo-label imu-label">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                                </svg>
                                Imunidades
                            </span>
                            <div class="tag-list">${tagList(t.imunidade)}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        listar();
    </script>
</body>
</html>
