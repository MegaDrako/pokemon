<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Treinador - Pokemon DataCenter</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>Pokemon DataCenter</h1>
            <nav>
                <ul>
                    <li><a href="/index.html">Início</a></li>
                    <li><a href="/paginas/pokemon.html">Pokemon</a></li>
                    <li><a href="/paginas/tipos.html">Tipos</a></li>
                    <li><a href="/paginas/treinadores.html">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container">
        <a href="/paginas/treinadores.html" class="back-link">← Voltar para lista</a>

        <div class="form-container">
            <h2>Cadastrar Novo Treinador</h2>

            <form onsubmit="adicionar(); return false;">
                <div class="form-group">
                    <label for="nome">Nome do Treinador *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="reg">Região *</label>
                    <input type="text" id="reg" name="reg" required>
                </div>

                <div class="form-group">
                    <label for="anoInicio">Ano de Início da Carreira *</label>
                    <input type="number" id="anoInicio" name="anoInicio" min="1900" max="2026" required>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <a href="/paginas/treinadores.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Rodapé -->
    <footer>
        <div class="container">
            <p>Desenvolvido por: Henry Barcellos</p>
        </div>
    </footer>

    <script src="../js/treinador.js"></script>
</body>

</html>
