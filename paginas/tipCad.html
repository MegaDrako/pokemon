<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Tipo - Pokemon DataCenter</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>Pokemon DataCenter</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="pokemon.html">Pokemon</a></li>
                    <li><a href="tipos.html">Tipos</a></li>
                    <li><a href="treinadores.html">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container">
        <a href="tipos.html" class="back-link">← Voltar para lista</a>

        <div class="form-container">
            <h2>Cadastrar Novo Tipo</h2>

            <form onsubmit="adicionar(); return false;">
                <div class="form-group">
                    <label for="nome">Nome do Tipo *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="fraq">Fraquezas *</label>
                    <input type="text" id="fraq" name="fraq" required>
                </div>

                <div class="form-group">
                    <label for="res">Resistências *</label>
                    <input type="text" id="res" name="res" required>
                </div>

                <div class="form-group">
                    <label for="imu">Imunidades *</label>
                    <input type="text" id="imu" name="imu" required>
                </div>


                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <a href="tipos.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Rodapé -->
    <footer>
        <div class="container">
            <p>Desenvolvido por: Henry Barcellos</p>
        </div>
    </footer>

    <script src="../js/tipo.js"></script>
</body>

</html>
