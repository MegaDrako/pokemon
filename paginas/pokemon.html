<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon — Pokédex DataCenter</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        #pokeGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        @media (max-width: 1100px) { #pokeGrid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 750px)  { #pokeGrid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px)  { #pokeGrid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="client-body">

    <header class="client-header">
        <div class="client-header-inner container">
            <div class="client-logo">
                <svg class="pokeball-logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="19" fill="white" stroke="#ccc" stroke-width="1"/>
                    <path d="M1 20 Q1 1 20 1 Q39 1 39 20 Z" fill="#e63946"/>
                    <rect x="1" y="18" width="38" height="4" fill="#1a1a2e"/>
                    <circle cx="20" cy="20" r="6" fill="white" stroke="#1a1a2e" stroke-width="2.5"/>
                    <circle cx="20" cy="20" r="3" fill="#e63946"/>
                </svg>
                <span>Pokédex DataCenter</span>
            </div>
            <nav class="client-nav">
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="pokemon.html" class="active">Pokémon</a></li>
                    <li><a href="tipos.html">Tipos</a></li>
                    <li><a href="treinadores.html">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="client-page-hero pokemon-hero">
        <div class="container">
            <h1>Pokémon</h1>
            <p>Explore todos os Pokémon cadastrados no sistema</p>
        </div>
    </div>

    <main class="container client-main">
        <div class="client-toolbar">
            <div class="search-bar">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="campoBusca" placeholder="Buscar por nome, tipo, região ou geração…" oninput="listar()">
            </div>
            <p class="search-count" id="contagem"></p>
        </div>

        <div id="pokeGrid">
            <!-- Cards renderizados pelo JS -->
        </div>
    </main>

    <footer class="client-footer">
        <div class="container client-footer-inner">
            <p>Desenvolvido por: Henry Barcellos</p>
            <a href="../admin/index.html" class="admin-link">Área Admin ⚙</a>
        </div>
    </footer>

    <script>
        const TYPE_COLORS = {
            'fogo':     '#EE8130', 'fire':     '#EE8130',
            'agua':     '#6390F0', 'water':    '#6390F0',
            'planta':   '#7AC74C', 'grass':    '#7AC74C',
            'elétrico': '#F7D02C', 'eletrico': '#F7D02C', 'electric': '#F7D02C',
            'normal':   '#A8A77A',
            'voador':   '#89AAE3', 'flying':   '#89AAE3',
            'veneno':   '#A33EA1', 'poison':   '#A33EA1',
            'terra':    '#E2BF65', 'ground':   '#E2BF65',
            'pedra':    '#B6A136', 'rock':     '#B6A136',
            'gelo':     '#96D9D6', 'ice':      '#96D9D6',
            'lutador':  '#C22E28', 'fighting': '#C22E28',
            'psíquico': '#F95587', 'psiquico': '#F95587', 'psychic': '#F95587',
            'inseto':   '#A6B91A', 'bug':      '#A6B91A',
            'fantasma': '#735797', 'ghost':    '#735797',
            'dragão':   '#6F35FC', 'dragao':   '#6F35FC', 'dragon':  '#6F35FC',
            'aço':      '#B7B7CE', 'aco':      '#B7B7CE', 'steel':   '#B7B7CE',
            'sombrio':  '#705746', 'dark':     '#705746',
            'fada':     '#D685AD', 'fairy':    '#D685AD',
        };

        function typeColor(tipo) {
            return TYPE_COLORS[tipo.toLowerCase().trim()] || '#6B7280';
        }

        function typeBadges(tipagem) {
            if (!tipagem) return '';
            return tipagem.split('/').map(t => {
                const cor = typeColor(t.trim());
                return `<span class="type-badge" style="background:${cor}">${t.trim()}</span>`;
            }).join('');
        }

        function primaryTypeColor(tipagem) {
            if (!tipagem) return '#6B7280';
            const first = tipagem.split('/')[0].trim();
            return typeColor(first);
        }

        function listar() {
            const pokemons = JSON.parse(localStorage.getItem('pokemons')) || [];
            const termo = (document.getElementById('campoBusca').value || '').toLowerCase().trim();

            const filtrados = pokemons.filter(p => {
                if (!termo) return true;
                return (
                    p.nome.toLowerCase().includes(termo) ||
                    p.tipagem.toLowerCase().includes(termo) ||
                    p.regiao.toLowerCase().includes(termo) ||
                    String(p.geracao).toLowerCase().includes(termo)
                );
            });

            const cont = document.getElementById('contagem');
            cont.textContent = termo
                ? `${filtrados.length} resultado(s) para "${termo}"`
                : `${pokemons.length} Pokémon cadastrado(s)`;

            const grid = document.getElementById('pokeGrid');

            if (filtrados.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="80" height="80" style="opacity:0.3">
                            <circle cx="40" cy="40" r="38" fill="none" stroke="#941d1d" stroke-width="3"/>
                            <path d="M2 40 Q2 2 40 2 Q78 2 78 40 Z" fill="#941d1d" opacity="0.4"/>
                            <rect x="2" y="36" width="76" height="8" fill="#1a1a2e" opacity="0.4"/>
                            <circle cx="40" cy="40" r="13" fill="white" stroke="#1a1a2e" stroke-width="3" opacity="0.6"/>
                            <circle cx="40" cy="40" r="6" fill="#941d1d" opacity="0.4"/>
                        </svg>
                        <p>Nenhum Pokémon encontrado.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtrados.map((p, idx) => {
                const color = primaryTypeColor(p.tipagem);
                const num = String(idx + 1).padStart(3, '0');
                return `
                <div class="poke-card" style="--type-color:${color}">
                    <div class="poke-card-header">
                        <span class="poke-number">#${num}</span>
                        <span class="poke-gen-badge">Gen ${p.geracao}</span>
                        <svg class="poke-ball-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="48" fill="rgba(255,255,255,0.08)"/>
                            <path d="M2 50 Q2 2 50 2 Q98 2 98 50 Z" fill="rgba(255,255,255,0.12)"/>
                            <rect x="2" y="45" width="96" height="10" fill="rgba(0,0,0,0.15)"/>
                            <circle cx="50" cy="50" r="14" fill="rgba(255,255,255,0.2)" stroke="rgba(0,0,0,0.15)" stroke-width="3"/>
                        </svg>
                    </div>
                    <div class="poke-card-body">
                        <h3 class="poke-name">${p.nome}</h3>
                        <div class="poke-region">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                                <circle cx="12" cy="9" r="2.5"/>
                            </svg>
                            ${p.regiao}
                        </div>
                        <div class="poke-types">${typeBadges(p.tipagem)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        listar();
    </script>
</body>
</html>
