<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Pokemon - Pokemon DataCenter</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>Pokemon DataCenter</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="pokemon.html">Pokemon</a></li>
                    <li><a href="tipos.html">Tipos</a></li>
                    <li><a href="treinadores.html">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <a href="pokemon.html" class="back-link">← Voltar para lista</a>

        <div class="form-container">
            <h2>Cadastrar Novo Pokemon</h2>

            <form onsubmit="adicionar(); return false;">
                <div class="form-group">
                    <label for="nome">Nome do Pokemon *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="gen">Geração *</label>
                    <input type="number" id="gen" name="gen" min="1" required>
                </div>

                <div class="form-group">
                    <label for="reg">Região de Origem *</label>
                    <input type="text" id="reg" name="reg" required>
                </div>

                <div class="form-group">
                    <label for="tipo">Tipagem *</label>
                    <input type="text" id="tipagem" name="tipagem" required>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <a href="pokemon.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Rodapé -->
    <footer>
        <div class="container">
            <p>Desenvolvido por: Henry Barcellos</p>
        </div>
    </footer>

    <script src="../js/pokemon.js"></script>
</body>

</html>
