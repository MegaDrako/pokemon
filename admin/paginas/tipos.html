<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tipos - Pokemon DataCenter</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Pokemon DataCenter <span class="admin-badge-header">Admin</span></h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="pokemon.html">Pokemon</a></li>
                    <li><a href="tipos.html" class="active">Tipos</a></li>
                    <li><a href="treinadores.html">Treinadores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2>Lista de Tipos</h2>
            <a href="tipCad.html" class="btn btn-success">+ Novo Tipo</a>
        </div>

        <!-- Barra de busca -->
        <div class="search-bar">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="campoBusca" placeholder="Buscar por nome, fraqueza, resistência ou imunidade…"
                oninput="listar()">
        </div>
        <p class="search-count" id="contagem"></p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Fraquezas</th>
                        <th>Resistências</th>
                        <th>Imunidades</th>
                        <th>Editar</th>
                        <th>Excluir</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal de Edição -->
    <div id="modalEditar" class="modal-overlay" style="display:none" onclick="fecharModalFora(event)">
        <div class="modal">
            <div class="modal-header">
                <h3>✏️ Editar Tipo</h3>
                <button class="modal-close" onclick="fecharModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="editNome">Nome</label>
                    <input type="text" id="editNome" placeholder="Nome do tipo">
                </div>
                <div class="form-group">
                    <label for="editFraq">Fraquezas</label>
                    <input type="text" id="editFraq" placeholder="Ex: Agua, Pedra, Terra">
                </div>
                <div class="form-group">
                    <label for="editRes">Resistências</label>
                    <input type="text" id="editRes" placeholder="Ex: Fogo, Planta, Gelo">
                </div>
                <div class="form-group">
                    <label for="editImu">Imunidades</label>
                    <input type="text" id="editImu" placeholder="Ex: Fantasma, Terra  (ou -)">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>

    <script src="../../js/tipo.js"></script>
    <script>listar();</script>

    <footer>
        <div class="container">
            <p>Desenvolvido por: Henry Barcellos | <a href="../../index.html" style="color:#9ca3af">← Site público</a></p>
        </div>
    </footer>
</body>
</html>
